<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipment Tracking - RPLMS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #5C59F2;
            --primary-dark: #4E4AC8;
            --orange: #D97706;
            --orange-bg: #FEF3C7;
            --green: #16A34A;
            --green-bg: #DCFCE7;
            --red: #DC2626;
            --red-bg: #FEE2E2;
            --border: #E5E7EB;
            --radius-lg: 16px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        h1,
        h2,
        h3,
        .btn,
        .nav-item span {
            font-family: 'Poppins', sans-serif;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 24px;
        }

        .req-card {
            background: #fff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            padding: 24px;
            border: 1.5px solid transparent;
            transition: all .2s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .req-card:hover {
            transform: translateY(-4px);
            border-color: #D3D7FA;
            box-shadow: 0 10px 15px -3px rgba(92, 89, 242, 0.1), 0 4px 6px -2px rgba(92, 89, 242, 0.05);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .team-id-badge {
            font-size: 12px;
            font-weight: 700;
            color: #4B5563;
            background: #F3F4F6;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 20px;
            white-space: nowrap;
            text-transform: uppercase;
        }

        .badge.pending {
            background: var(--orange-bg);
            color: var(--orange);
        }

        .badge.approved {
            background: var(--green-bg);
            color: var(--green);
        }

        .badge.rejected {
            background: var(--red-bg);
            color: var(--red);
        }

        .card-body {
            flex-grow: 1;
            margin-bottom: 20px;
        }

        .team-name {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            color: #111827;
        }

        .btn {
            border: none;
            border-radius: 12px;
            font-size: 13.5px;
            font-weight: 600;
            padding: 12px 18px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
            width: 100%;
            transition: all .15s;
            cursor: pointer;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        /* ── Equipment Status Panel ─────────────────────────── */
        .status-panel {
            background: #fff;
            border-radius: 14px;
            box-shadow: var(--shadow);
            padding: 24px;
            margin-bottom: 24px;
            border: 1.5px solid #E0E7FF;
        }

        .status-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .status-panel-title {
            font-size: 17px;
            font-weight: 800;
            color: #111827;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-panel-icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: linear-gradient(135deg, #818CF8, #4F3CF5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            color: #fff;
        }

        .eq-status-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 340px;
            overflow-y: auto;
        }

        .eq-status-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1.5px solid #F3F4F6;
            background: #FAFAFA;
            transition: border-color 0.2s;
        }

        .eq-status-row:hover {
            border-color: #C7D2FE;
            background: #F8F8FF;
        }

        .eq-status-info {
            flex: 1;
            min-width: 0;
        }

        .eq-status-name {
            font-size: 14px;
            font-weight: 700;
            color: #111827;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .eq-status-meta {
            font-size: 11px;
            color: #6B7280;
            margin-top: 2px;
        }

        .eq-status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            font-weight: 700;
            padding: 5px 11px;
            border-radius: 20px;
            white-space: nowrap;
        }

        .eq-badge-available {
            background: #DCFCE7;
            color: #16A34A;
        }

        .eq-badge-maintenance {
            background: #FEF3C7;
            color: #B45309;
        }

        .eq-badge-repairing {
            background: #FEE2E2;
            color: #DC2626;
        }

        .eq-badge-inuse {
            background: #DBEAFE;
            color: #1D4ED8;
        }

        .eq-badge-retired {
            background: #F3F4F6;
            color: #6B7280;
        }

        /* Status change select inline */
        .eq-status-select {
            padding: 7px 10px;
            border: 1.5px solid #C7D2FE;
            border-radius: 8px;
            font-size: 12px;
            font-family: inherit;
            font-weight: 600;
            color: #374151;
            background: #fff;
            cursor: pointer;
            outline: none;
            min-width: 140px;
        }

        .eq-status-select:focus {
            border-color: var(--primary);
        }

        .eq-save-btn {
            padding: 7px 14px;
            border-radius: 8px;
            border: none;
            background: var(--primary);
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s;
        }

        .eq-save-btn:hover {
            background: var(--primary-dark);
        }
    </style>
</head>

<body>

    <div class="app-container">

        <!-- SIDEBAR -->
        <aside class="sidebar"></aside>

        <!-- MAIN PANEL -->
        <main class="main-content">

            <!-- HEADER -->
            <header class="header">
                <div class="header-left">
                    <button class="sidebar-toggle" id="sidebarToggleBtn">&#9776;</button>
                    <div class="page-title-area">
                        <h1 class="page-title">Equipment Approvals</h1>
                        <ul class="breadcrumbs">
                            <li>Home</li>
                            <li>Equipment Approvals</li>
                        </ul>
                    </div>
                </div>

                <div class="header-right">
                    <button class="header-icon-btn">
                        <span class="icon">&#128276;</span>
                        <span class="icon-badge">3</span>
                    </button>
                    <div class="header-date-widget"></div>
                </div>
            </header>

            <!-- CONTENT BODY -->
            <div class="page-content-wrapper" style="max-width: 1200px; margin: 0 auto; padding: 24px;">

                <!-- KPI METRICS GRID -->
                <div
                    style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 24px;">
                    <div
                        style="background: #fff; padding: 20px; border-radius: 12px; box-shadow: var(--shadow); border: 1.5px solid #F3F4F6;">
                        <div
                            style="font-size: 11px; text-transform: uppercase; font-weight: 700; color: #6B7280; letter-spacing: 0.5px;">
                            Total Team Requests</div>
                        <div id="kpiTotalTeams"
                            style="font-size: 28px; font-weight: 800; color: #111827; margin-top: 8px;">0</div>
                    </div>
                    <div
                        style="background: #fff; padding: 20px; border-radius: 12px; box-shadow: var(--shadow); border: 1.5px solid #F3F4F6;">
                        <div
                            style="font-size: 11px; text-transform: uppercase; font-weight: 700; color: var(--orange); letter-spacing: 0.5px;">
                            Pending Approvals</div>
                        <div id="kpiPendingTeams"
                            style="font-size: 28px; font-weight: 800; color: var(--orange); margin-top: 8px;">0</div>
                    </div>
                    <div
                        style="background: #fff; padding: 20px; border-radius: 12px; box-shadow: var(--shadow); border: 1.5px solid #F3F4F6;">
                        <div
                            style="font-size: 11px; text-transform: uppercase; font-weight: 700; color: var(--green); letter-spacing: 0.5px;">
                            Approved Requests</div>
                        <div id="kpiApprovedTeams"
                            style="font-size: 28px; font-weight: 800; color: var(--green); margin-top: 8px;">0</div>
                    </div>
                    <div
                        style="background: #fff; padding: 20px; border-radius: 12px; box-shadow: var(--shadow); border: 1.5px solid #F3F4F6;">
                        <div
                            style="font-size: 11px; text-transform: uppercase; font-weight: 700; color: var(--red); letter-spacing: 0.5px;">
                            Rejected & Flagged</div>
                        <div id="kpiRejectedTeams"
                            style="font-size: 28px; font-weight: 800; color: var(--red); margin-top: 8px;">0</div>
                    </div>
                </div>

                <!-- SEARCH & FILTER BAR -->
                <div
                    style="display: flex; gap: 16px; align-items: center; background: #fff; padding: 16px; border-radius: 12px; box-shadow: var(--shadow); margin-bottom: 24px; flex-wrap: wrap;">
                    <div style="flex-grow: 1; min-width: 250px;">
                        <input type="text" id="teamSearchInput" placeholder="Search by Team ID, Team Name, or Asset..."
                            style="width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13.5px; outline: none; box-sizing: border-box;">
                    </div>
                    <select id="teamStatusFilter"
                        style="padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13.5px; background: #fff; cursor: pointer;">
                        <option value="all">All Overall Statuses</option>
                        <option value="pending">Pending</option>
                        <option value="approved">Approved</option>
                        <option value="rejected">Rejected / Flagged</option>
                    </select>
                    <select id="teamLabFilter"
                        style="padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13.5px; background: #fff; cursor: pointer;">
                        <option value="all">All Labs</option>
                        <option value="Electronics Lab">Electronics Lab</option>
                        <option value="Mechanical Lab">Mechanical Lab</option>
                        <option value="Robotics Lab">Robotics Lab</option>
                        <option value="Fabrication Lab">Fabrication Lab</option>
                        <option value="IoT Lab">IoT Lab</option>
                    </select>
                    <button id="clearTeamFilters" class="btn"
                        style="width: auto; padding: 10px 16px; border-radius: 8px; font-size: 13.5px; background:#E5E7EB; color:#1F2937;">Clear
                        Filters</button>
                </div>

                <!-- CARDS GRID -->
                <div class="cards-grid" id="trackingCardsGrid" style="margin-top: 0; margin-bottom: 24px;">
                    <!-- Rendered programmatically -->
                </div>
                <!-- EQUIPMENT STATUS MANAGEMENT PANEL -->
                <div class="status-panel" id="statusMgmtPanel">
                    <div class="status-panel-header">
                        <div class="status-panel-title">
                            <div class="status-panel-icon">🔧</div>
                            Equipment Status Management
                        </div>
                        <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
                            <select id="statusFilterPanel"
                                style="padding:8px 12px; border:1.5px solid #E5E7EB; border-radius:8px; font-size:12.5px; font-family:inherit; color:#374151; background:#fff; cursor:pointer; outline:none;">
                                <option value="all">All Equipment</option>
                                <option value="Available">Available</option>
                                <option value="Maintenance">Under Maintenance</option>
                                <option value="Repairing">Repairing</option>
                                <option value="In Use">In Use</option>
                                <option value="Retired">Retired</option>
                            </select>
                            <div style="position:relative;">
                                <input type="text" id="statusSearchPanel" placeholder="Search equipment..."
                                    style="padding:8px 12px 8px 32px; border:1.5px solid #E5E7EB; border-radius:8px; font-size:12.5px; font-family:inherit; outline:none; min-width:200px;">
                                <span
                                    style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:#9CA3AF;">🔍</span>
                            </div>
                        </div>
                    </div>
                    <div class="eq-status-list" id="eqStatusList">
                        <!-- Rendered by equipment.js -->
                    </div>
                    <div id="eqStatusEmpty" style="display:none; text-align:center; padding:32px; color:#6B7280;">
                        <div style="font-size:32px; margin-bottom:8px;">⚙️</div>
                        <div style="font-weight:600;">No equipment found</div>
                    </div>
                </div>

                <!-- PAGINATION CONTROLS -->
                <div
                    style="display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 12px 20px; border-radius: 12px; box-shadow: var(--shadow); margin-bottom: 24px;">
                    <div id="paginationInfo" style="font-size: 13.5px; color: #4B5563; font-weight: 500;">
                        Showing 0-0 of 0 teams
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <button id="prevPageBtn" class="btn"
                            style="width: auto; padding: 8px 16px; border-radius: 8px; font-size: 13px; background:#E5E7EB; color:#1F2937;">Previous</button>
                        <button id="nextPageBtn" class="btn btn-primary"
                            style="width: auto; padding: 8px 16px; border-radius: 8px; font-size: 13px;">Next</button>
                    </div>
                </div>

            </div>

            <!-- FOOTER -->
            <footer class="page-footer">
                &copy; 2025 RPLMS - Rapid Prototyping Lab Management System. All rights reserved.
            </footer>

        </main>

    </div>

    <script src="js/common.js"></script>
    <script src="js/equipment.js"></script>
    <script>
        renderBaseLayout("equipment-tracking");
    </script>
</body>

</html>
