<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - RPLMS</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-container">
  
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">&#11021;</div>
      <h1 class="login-title">RPLMS</h1>
      <p class="login-subtitle">Rapid Prototyping Lab Management System</p>
    </div>

    <form id="loginForm" class="login-form">
      <div class="form-group">
        <label class="form-label" for="email">Email Address <span class="required-star">*</span></label>
        <input type="email" id="email" name="email" class="form-control" placeholder="e.g. priya.sharma@rplms.com">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password <span class="required-star">*</span></label>
        <input type="password" id="password" name="password" class="form-control" placeholder="••••••••">
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 8px;">
        Sign In
      </button>
    </form>

    <div style="margin-top: 20px; font-size: 11px; color: var(--text-secondary); text-align: center;">
      <p>Demo Account: <strong>priya.sharma@rplms.com</strong> / <strong>password</strong></p>
    </div>
  </div>

  <script src="js/common.js"></script>
  <script src="js/validation.js"></script>
  <script>
    // Overwrite checkAuth redirect for login itself
    localStorage.removeItem("rplms_logged_in"); // Clear default login flag on load

    const loginSchema = {
      email: { required: true, type: "email" },
      password: { required: true }
    };

    new RPLMSFormValidator("loginForm", loginSchema, (data) => {
      if (data.email === "priya.sharma@rplms.com" && data.password === "password") {
        localStorage.setItem("rplms_logged_in", "true");
        showToast("Signed in successfully. Redirecting...", "success");
        setTimeout(() => {
          window.location.href = "C:/Users/3235115/Downloads/New folder/faculty-main final version/login1.html";
        }, 1200);
      } else {
        showToast("Invalid email or password. Please use demo credentials.", "error");
        // Focus first field
        document.getElementById("email").focus();
      }
    });
  </script>
</body>
</html>
