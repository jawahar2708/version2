<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipment Approval Details - RPLMS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #5C59F2;
            --primary-dark: #4E4AC8;
            --orange: #D97706;
            --orange-bg: #FEF3C7;
            --green: #16A34A;
            --green-bg: #DCFCE7;
            --red: #DC2626;
            --red-bg: #FEE2E2;
            --border: #E5E7EB;
            --radius-lg: 16px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        h1,
        h2,
        h3,
        .btn,
        .nav-item span {
            font-family: 'Poppins', sans-serif;
        }

        .details-container {
            background: #fff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            padding: 24px;
            margin-top: 24px;
        }

        .details-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 16px;
            margin-bottom: 24px;
        }

        .team-title {
            margin: 0;
            font-size: 24px;
            font-weight: 800;
            color: #111827;
        }

        .team-meta {
            font-size: 14px;
            color: #6B7280;
            margin-top: 4px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 20px;
            text-transform: uppercase;
        }

        .badge.pending {
            background: var(--orange-bg);
            color: var(--orange);
        }

        .badge.approved {
            background: var(--green-bg);
            color: var(--green);
        }

        .badge.rejected {
            background: var(--red-bg);
            color: var(--red);
        }

        .badge.handovered {
            background: #DBEAFE;
            color: #2563EB;
        }

        .custom-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            margin-top: 16px;
        }

        .custom-table th {
            padding: 12px 16px;
            color: #4B5563;
            background: #F9FAFB;
            border-bottom: 1.5px solid var(--border);
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
        }

        .custom-table td {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
            font-size: 14px;
        }

        .btn {
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            padding: 8px 16px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s ease;
            text-decoration: none;
        }

        .btn-success {
            background: #10B981;
            color: #fff;
        }

        .btn-success:hover {
            background: #059669;
        }

        .btn-danger {
            background: #EF4444;
            color: #fff;
        }

        .btn-danger:hover {
            background: #DC2626;
        }

        .btn-secondary {
            background: #F3F4F6;
            color: #4B5563;
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: #E5E7EB;
        }

        .repair-note {
            display: block;
            margin-top: 6px;
            font-size: 12px;
            color: var(--red);
            font-weight: 500;
            background: var(--red-bg);
            padding: 4px 8px;
            border-radius: 4px;
            width: fit-content;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- SIDEBAR -->
        <aside class="sidebar"></aside>

        <!-- MAIN PANEL -->
        <main class="main-content">
            <!-- HEADER -->
            <header class="header">
                <div class="header-left">
                    <button class="sidebar-toggle" id="sidebarToggleBtn">&#9776;</button>
                    <div class="page-title-area">
                        <h1 class="page-title">Request Details</h1>
                        <ul class="breadcrumbs">
                            <li><a href="equipment-tracking.html"
                                    style="color: inherit; text-decoration: none;">Equipment Approvals</a></li>
                            <li>Request Details</li>
                        </ul>
                    </div>
                </div>

                <div class="header-right">
                    <button class="header-icon-btn">
                        <span class="icon">&#128276;</span>
                        <span class="icon-badge">3</span>
                    </button>
                    <div class="header-date-widget"></div>
                </div>
            </header>

            <!-- CONTENT BODY -->
            <div class="page-content-wrapper" style="max-width: 1200px; margin: 0 auto; padding: 24px;">
                <div style="margin-bottom: 20px;">
                    <a href="equipment-tracking.html" class="btn btn-secondary">&larr; Back to Approvals</a>
                </div>

                <div class="details-container">
                    <div class="details-header">
                        <div>
                            <h2 class="team-title" id="teamName">Team Name</h2>
                            <div class="team-meta" id="teamMeta">Team ID: TEAM-XXX</div>
                        </div>
                        <div>
                            <span class="badge" id="overallStatusBadge">Pending</span>
                        </div>
                    </div>

                    <table class="custom-table">
                        <thead>
                            <tr>
                                <th>Equipment Type</th>
                                <th>Equipment ID</th>
                                <th>Time Slot</th>
                                <th>Status</th>
                                <th style="width: 240px; text-align: center;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="detailsTableBody">
                            <!-- Loaded programmatically -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- FOOTER -->
            <footer class="page-footer">
                &copy; 2025 RPLMS - Rapid Prototyping Lab Management System. All rights reserved.
            </footer>
        </main>
    </div>

    <script src="js/common.js"></script>

    <!-- Raise Ticket Modal inside details page -->
    <div id="raiseTicketModalDetail" class="modal"
        style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); align-items:center; justify-content:center; z-index: 1000;">
        <div
            style="background:#fff; border-radius:12px; padding:20px; width:520px; max-width:95%; box-shadow:var(--shadow);">
            <h3 style="margin-top:0;">Raise Ticket</h3>
            <form id="raiseTicketFormDetail">
                <div style="margin-bottom:8px;"><label
                        style="font-size:12px; font-weight:700; color:var(--text-secondary);">Team ID</label>
                    <div id="modalTeamIdDetail" style="font-weight:700;"></div>
                </div>
                <div style="margin-bottom:8px;"><label
                        style="font-size:12px; font-weight:700; color:var(--text-secondary);">Team Name</label>
                    <div id="modalTeamNameDetail" style="font-weight:600;"></div>
                </div>
                <div style="margin-bottom:8px;"><label
                        style="font-size:12px; font-weight:700; color:var(--text-secondary);">Asset ID / Type</label>
                    <div id="modalAssetIdDetail" style="font-weight:700;"></div>
                </div>
                <div style="margin-bottom:8px;"><label
                        style="font-size:12px; font-weight:700; color:var(--text-secondary);">Asset Name</label>
                    <div id="modalAssetNameDetail" style="font-weight:600;"></div>
                </div>
                <div style="margin-bottom:8px;" id="modalTimeSlotContainerDetail"><label
                        style="font-size:12px; font-weight:700; color:var(--text-secondary);">Booking Slot</label>
                    <div id="modalTimeSlotDetail" style="font-weight:600; color:#5C59F2;"></div>
                </div>
                <div style="margin-bottom:8px;"><label
                        style="font-size:12px; font-weight:700; color:var(--text-secondary);">Damage Type</label>
                    <div id="modalDamageTypeDetail" style="font-weight:700; color:#EF4444;"></div>
                </div>
                <div style="margin-bottom:8px;"><label
                        style="font-size:12px; font-weight:700; color:var(--text-secondary);">Damage Details</label>
                    <textarea id="modalDamageDetailsDetail" required
                        style="width:100%; height:90px; padding:8px; margin-top:6px; border:1.5px solid var(--border); border-radius:6px; outline:none; resize:vertical; font-family: inherit; font-size: 13px;"></textarea>
                </div>
                <div style="text-align:right; margin-top:16px;">
                    <button type="button" class="btn btn-secondary"
                        style="width:auto; display:inline-flex; padding: 8px 16px;"
                        onclick="closeDetailRaiseModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary"
                        style="margin-left:8px; width:auto; display:inline-flex; padding: 8px 16px;">Submit
                        Ticket</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        renderBaseLayout("equipment-tracking");

        document.addEventListener("DOMContentLoaded", () => {
            const params = new URLSearchParams(window.location.search);
            const teamId = params.get("teamId");

            if (!teamId) {
                window.location.href = "equipment-tracking.html";
                return;
            }

            let db = getDB();
            let teamRecord = db.equipmentRequests.find(t => t.teamId === teamId);

            if (!teamRecord) {
                window.location.href = "equipment-tracking.html";
                return;
            }

            const teamNameEl = document.getElementById("teamName");
            const teamMetaEl = document.getElementById("teamMeta");
            const overallStatusBadge = document.getElementById("overallStatusBadge");
            const tableBody = document.getElementById("detailsTableBody");

            function getTeamOverallStatus(requests) {
                if (requests.some(r => r.status === "Pending")) {
                    return "pending";
                }
                if (requests.every(r => r.status === "Rejected")) {
                    return "rejected";
                }
                return "approved";
            }

            function updateUI() {
                db = getDB();
                const currentTeam = db.equipmentRequests.find(t => t.teamId === teamId);

                teamNameEl.textContent = currentTeam.teamName;
                teamMetaEl.textContent = `Team ID: ${currentTeam.teamId}`;

                const overall = getTeamOverallStatus(currentTeam.requests);
                overallStatusBadge.textContent = overall;
                overallStatusBadge.className = `badge ${overall}`;

                tableBody.innerHTML = currentTeam.requests.map(req => {
                    let actionsHtml = "";
                    if (req.status === "Pending") {
                        actionsHtml = `
                            <div style="display: flex; gap: 8px; justify-content: center;">
                                <button class="btn btn-success" onclick="approveRequest('${req.id}')">Approve</button>
                                <button class="btn btn-danger" onclick="rejectRequest('${req.id}')">Reject</button>
                            </div>
                        `;
                    } else if (req.status === "Approved") {
                        actionsHtml = `
                            <div style="display: flex; gap: 8px; justify-content: center;">
                                <button class="btn btn-primary" style="background:#5C59F2; color:#fff;" onclick="handoverRequest('${req.id}')">Handover</button>
                            </div>
                        `;
                    } else if (req.status === "Handovered") {
                        const selectedCondition = req.condition || "";
                        let raiseTicketBtn = "";
                        if (["Damaged", "Lost", "Unusable"].includes(selectedCondition) && !req.ticketRaised) {
                            raiseTicketBtn = `<button class="btn btn-danger" style="margin-left: 8px; padding: 6px 12px; font-size:12px; width:auto; display:inline-flex; border-radius:6px;" onclick="openDetailRaiseModal('${req.id}')">Raise Ticket</button>`;
                        } else if (req.ticketRaised) {
                            raiseTicketBtn = `<span style="margin-left: 8px; font-size: 12px; color: #16A34A; font-weight: 700;">✓ Ticket Raised</span>`;
                        }

                        actionsHtml = `
                            <div style="display: flex; align-items: center; justify-content: center; gap: 4px;">
                                <select onchange="updateRequestCondition('${req.id}', this.value)" style="padding: 6px; border: 1.5px solid var(--border); border-radius: 6px; font-size: 13px; cursor: pointer;">
                                    <option value="" ${selectedCondition === '' ? 'selected' : ''}>-- Condition --</option>
                                    <option value="Good" ${selectedCondition === 'Good' ? 'selected' : ''}>Good</option>
                                    <option value="Damaged" ${selectedCondition === 'Damaged' ? 'selected' : ''}>Damaged</option>
                                    <option value="Lost" ${selectedCondition === 'Lost' ? 'selected' : ''}>Lost</option>
                                    <option value="Unusable" ${selectedCondition === 'Unusable' ? 'selected' : ''}>Unusable</option>
                                </select>
                                ${raiseTicketBtn}
                            </div>
                        `;
                    } else {
                        actionsHtml = `<div style="text-align: center; color: #6B7280; font-weight: 500;">No actions available</div>`;
                    }

                    let statusBadgeClass = "pending";
                    if (req.status === "Approved") statusBadgeClass = "approved";
                    if (req.status === "Rejected") statusBadgeClass = "rejected";
                    if (req.status === "Handovered") statusBadgeClass = "handovered";

                    let noteHtml = "";
                    if (req.status === "Rejected" && req.note) {
                        noteHtml = `<span class="repair-note">🔧 ${req.note}</span>`;
                    }

                    return `
                        <tr>
                            <td style="font-weight: 600; color: #374151;">${req.equipmentType}</td>
                            <td style="font-family: monospace; font-weight: 700; color: #111827;">${req.equipmentId} (${req.equipmentName})</td>
                            <td>${req.timeSlot}</td>
                            <td>
                                <span class="badge ${statusBadgeClass}">${req.status}</span>
                                ${noteHtml}
                            </td>
                            <td>${actionsHtml}</td>
                        </tr>
                    `;
                }).join("");
            }

            window.approveRequest = function (reqId) {
                db = getDB();
                const team = db.equipmentRequests.find(t => t.teamId === teamId);
                const req = team.requests.find(r => r.id === reqId);
                if (req) {
                    req.status = "Approved";
                    setDB(db);
                    showToast("Equipment approved successfully!", "success");
                    updateUI();
                }
            };

            window.rejectRequest = function (reqId) {
                db = getDB();
                const team = db.equipmentRequests.find(t => t.teamId === teamId);
                const req = team.requests.find(r => r.id === reqId);
                if (req) {
                    req.status = "Rejected";
                    req.note = "Sent for Repair";

                    // Flag the equipment for Repair/Maintenance in db.inventory
                    const invItem = db.inventory.find(item => item.id === req.equipmentId);
                    if (invItem) {
                        invItem.status = "Repairing";
                    }

                    setDB(db);
                    showToast("Equipment request rejected & flagged for repair.", "error");
                    updateUI();
                }
            };

            window.handoverRequest = function (reqId) {
                db = getDB();
                const team = db.equipmentRequests.find(t => t.teamId === teamId);
                const req = team.requests.find(r => r.id === reqId);
                if (req) {
                    req.status = "Handovered";
                    setDB(db);
                    showToast("Equipment marked as Handovered!", "success");
                    updateUI();
                }
            };

            window.updateRequestCondition = function (reqId, condition) {
                db = getDB();
                const team = db.equipmentRequests.find(t => t.teamId === teamId);
                const req = team.requests.find(r => r.id === reqId);
                if (req) {
                    req.condition = condition;
                    setDB(db);
                    updateUI();
                }
            };

            let activeDetailRaise = null;

            window.openDetailRaiseModal = function (reqId) {
                db = getDB();
                const team = db.equipmentRequests.find(t => t.teamId === teamId);
                const req = team.requests.find(r => r.id === reqId);
                if (!req) return;

                activeDetailRaise = { reqId, req };

                document.getElementById("modalTeamIdDetail").textContent = team.teamId;
                document.getElementById("modalTeamNameDetail").textContent = team.teamName;
                document.getElementById("modalAssetIdDetail").textContent = `${req.equipmentId} (${req.equipmentType})`;
                document.getElementById("modalAssetNameDetail").textContent = req.equipmentName;

                if (req.timeSlot) {
                    document.getElementById("modalTimeSlotContainerDetail").style.display = "block";
                    document.getElementById("modalTimeSlotDetail").textContent = req.timeSlot;
                } else {
                    document.getElementById("modalTimeSlotContainerDetail").style.display = "none";
                }

                document.getElementById("modalDamageTypeDetail").textContent = req.condition || "Damaged";
                document.getElementById("modalDamageDetailsDetail").value = "";

                document.getElementById("raiseTicketModalDetail").style.display = "flex";
            };

            window.closeDetailRaiseModal = function () {
                document.getElementById("raiseTicketModalDetail").style.display = "none";
                activeDetailRaise = null;
            };

            document.getElementById("raiseTicketFormDetail").addEventListener("submit", (e) => {
                e.preventDefault();
                if (!activeDetailRaise) return;

                const details = document.getElementById("modalDamageDetailsDetail").value.trim();
                if (!details) {
                    showToast("Please enter damage details.", "error");
                    return;
                }

                db = getDB();
                const team = db.equipmentRequests.find(t => t.teamId === teamId);
                const req = team.requests.find(r => r.id === activeDetailRaise.reqId);
                if (!req) return;

                req.ticketRaised = true;

                const nextNum = db.tickets.length + 1;
                const newId = `TKT-${String(nextNum).padStart(3, "0")}`;
                const today = new Date();
                const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
                const dateStr = `${String(today.getDate()).padStart(2, "0")} ${months[today.getMonth()]} ${today.getFullYear()}`;
                const timeStr = today.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" });

                const newTicket = {
                    id: newId,
                    type: "Damage",
                    assignedTo: team.teamId,
                    subject: `${req.equipmentName} ${req.condition || 'Damaged'}`,
                    priority: "High",
                    date: dateStr,
                    status: "Open",
                    teamName: team.teamName,
                    equipmentName: req.equipmentName,
                    raisedBy: "Lab Incharge",
                    time: timeStr,
                    damageDescription: details,
                    fineAmount: "500",
                    dueDate: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }),
                    remarks: `Ticket raised during handover. Condition: ${req.condition || 'Damaged'}.`,
                    teamResponse: "",
                    lastUpdated: `${dateStr}, ${timeStr}`,
                    timeSlot: req.timeSlot || "" // Store booking slot timing
                };

                db.tickets.push(newTicket);

                const newNotif = {
                    id: `NTF-${String(db.notifications.length + 1).padStart(3, "0")}`,
                    icon: "🎫",
                    iconClass: "notif-icon-ticket",
                    body: `New damage ticket ${newId} raised against ${team.teamId} for ${req.equipmentName}.`,
                    time: "Just now",
                    unread: true
                };
                db.notifications.unshift(newNotif);

                if (req.condition === "Damaged" || req.condition === "Unusable") {
                    const invItem = db.inventory.find(item => item.id === req.equipmentId);
                    if (invItem) {
                        invItem.status = "Repairing";
                    }
                }

                setDB(db);
                showToast(`Ticket ${newId} raised successfully!`, "success");
                closeDetailRaiseModal();
                updateUI();
            });

            updateUI();
        });
    </script>
</body>

</html>
